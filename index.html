<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Gayathiri ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#1a001f,#330033);
color:white;
overflow-x:hidden;
text-align:center;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

h1{
font-size:55px;
color:#ff4da6;
text-shadow:0 0 20px pink;
}

h2{
margin-top:15px;
font-weight:normal;
font-size:25px;
}

button{
margin-top:40px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 30px #ff4da6;
}

.section{
padding:80px 20px;
display:none;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:40px;
}

.gallery img{
width:100%;
border-radius:20px;
transition:.4s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

.footer{
padding:80px 20px;
font-size:35px;
color:pink;
}

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:fall linear infinite;
top:-50px;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>

</head>
<body>

<div class="hero">
<h1>Rohith ❤️ Gayathiri</h1>

<h2>I made something special only for you...</h2>

<button onclick="showLove()">Open My Heart ❤️</button>

</div>

<div class="section" id="love">

<h1>Dear Gayathiri ❤️</h1>

<p style="margin-top:25px;font-size:22px;line-height:40px;max-width:800px;margin:auto;">
Thank you for coming into my life.<br><br>

Every smile of yours is my favourite memory.<br><br>

No matter where life takes us,<br>

You will always have a special place in my heart. ❤️
</p>

<div class="gallery">

<img src="photo1.jpg">

<img src="photo2.jpg">

<img src="photo3.jpg">

<img src="photo4.jpg">

<img src="photo5.jpg">

</div>

<div class="footer">

Forever ❤️

<br><br>

Rohith ❤️ Gayathiri

</div>

</div>

<script>

function showLove(){

document.querySelector(".hero").style.display="none";

document.getElementById("love").style.display="block";

}

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

},250);

</script>

</body>
</html>
