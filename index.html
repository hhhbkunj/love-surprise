<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Gayathiri ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#1a001f,#330033);
color:white;
overflow-x:hidden;
text-align:center;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

h1{
font-size:55px;
color:#ff4da6;
text-shadow:0 0 20px pink;
}

h2{
margin-top:15px;
font-weight:normal;
font-size:25px;
}

button{
margin-top:40px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 30px #ff4da6;
}

.section{
padding:80px 20px;
display:none;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:40px;
}

.gallery img{
width:100%;
border-radius:20px;
transition:.4s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

.footer{
padding:80px 20px;
font-size:35px;
color:pink;
}

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:fall linear infinite;
top:-50px;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>

</head>
<body>

<div id="lockScreen" style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;">
<div style="background:#1b1b1b;padding:30px;border-radius:20px;text-align:center;max-width:320px;width:90%;box-shadow:0 0 20px #ff4da6;">
<h2 style="color:#ff4da6;">🔒 Secret Surprise</h2>
<p>Enter Password</p>
<input id="pwd" type="password" placeholder="Password" style="padding:10px;width:90%;border-radius:10px;border:none;margin:10px 0;">
<br><button onclick="unlockSite()">Open</button>
<p id="msg" style="color:#ff8080;margin-top:10px;"></p>
</div></div>


<div class="hero" style="display:none;">
<h1>Gayathiri ❤️</h1>

<h2>I made something special only for you...</h2><h3 style="margin-top:20px;color:#ffd1e8;">💖 Open My Heart 💖</h3>

<button id="loveBtn" onclick="showLove()">Open My Heart ❤️</button>

</div>

<div class="section" id="love">

<h1 id="typingTitle">❤️</h1>

<p id="typingText" style="margin-top:25px;font-size:22px;line-height:40px;max-width:800px;margin:auto;white-space:pre-line;"></p>


<div class="gallery" style="max-width:430px;margin:40px auto;text-align:center;">
<img id="sliderImage" src="photo1.jpg" style="width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:20px;transition:opacity .6s ease;">
<div style="margin-top:18px;display:flex;justify-content:center;gap:15px;">
<button onclick="prevPhoto()">⬅ Previous</button>
<button onclick="nextPhoto()">Next ➡</button>
</div>
</div>

</div>



<div class="footer">

</div>

</div>

<div class="section" id="finalPage">
    <h1 style="margin-top:60px;">Forever ❤️</h1>
    <h2 style="margin-top:25px;">Gayathiri ❤️</h2>
    <p style="margin-top:25px;font-size:22px;line-height:38px;max-width:800px;margin-left:auto;margin-right:auto;">
        No matter where life takes us,<br><br>
        You will always have a special place in my heart. ❤️
    </p>
<br><br>
<button onclick="alert('❤️ Thank you Gayathiri ❤️')" style="padding:16px 36px;border:none;border-radius:30px;background:#ff4da6;color:white;font-size:18px;cursor:pointer;">Next ❤️</button>

</div>


<script>

function showLove(){

document.querySelector(".hero").style.display="none";

document.getElementById("love").style.display="block";

}

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

},250);


function unlockSite(){
 const p=document.getElementById("pwd").value.trim();
 if(p==="Gayu"){
   document.getElementById("msg").innerHTML="Loading Memories... ❤️<br><br><span id=\"loadPct\">0%</span>";
   let v=0;
   const timer=setInterval(function(){
      v+=5;
      document.getElementById("loadPct").innerText=v+"%";
      if(v>=100){
         clearInterval(timer);
         document.getElementById("lockScreen").style.display="none";
         document.querySelector(".hero").style.display="flex";
      }
   },120);
 }else{
   document.getElementById("msg").innerText="Wrong Password ❤️";
 }
}

const loveBtn=document.getElementById("loveBtn");
const texts=["😜 Catch Me!","😂 Too Slow!","🙈 Nope!","🤭 Try Again!","😎 Almost!","💘 Still Not!","🥰 One More!","😅 Keep Trying!","😍 Nearly There!","💖 Okay... Click Me!"];
let escapeCount=0;
loveBtn.addEventListener("mouseover",()=>{
 if(escapeCount>=9){loveBtn.innerHTML=texts[9];return;}
 const maxX=window.innerWidth-loveBtn.offsetWidth-20;
 const maxY=window.innerHeight-loveBtn.offsetHeight-20;
 loveBtn.style.position="fixed";
 loveBtn.style.left=Math.random()*maxX+"px";
 loveBtn.style.top=Math.random()*maxY+"px";
 loveBtn.innerHTML=texts[Math.min(escapeCount,9)];
 escapeCount++;
});


function showFinalPage(){
 document.getElementById("love").style.display="none";
 document.getElementById("finalPage").style.display="block";
}


const photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
let currentPhoto=0;
function showPhoto(){
 document.getElementById("sliderImage").src=photos[currentPhoto];
}
function nextPhoto(){
 currentPhoto=(currentPhoto+1)%photos.length;
 showPhoto();
}
function prevPhoto(){
 currentPhoto=(currentPhoto-1+photos.length)%photos.length;
 showPhoto();
}


const message=`Dear Gayathiri...

I never knew someone
could make my life
this beautiful...

Every smile of yours
became my favourite memory.

Thank you for being
part of my life. ❤️`;

function typeMessage(){
 let i=0;
 const title=document.getElementById("typingTitle");
 const box=document.getElementById("typingText");
 title.innerHTML="Dear Gayathiri ❤️";
 box.innerHTML="";
 const timer=setInterval(()=>{
   box.innerHTML+=message.charAt(i);
   i++;
   if(i>=message.length) clearInterval(timer);
 },45);
}

const oldShowLove=showLove;
showLove=function(){
 oldShowLove();
 setTimeout(typeMessage,300);
};


const photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
let current=0;

function renderPhoto(){
 const img=document.getElementById("sliderImage");
 if(!img) return;
 img.style.opacity=0;
 setTimeout(()=>{
   img.src=photos[current];
   img.style.opacity=1;
 },250);
}

function nextPhoto(){
 current=(current+1)%photos.length;
 renderPhoto();
}

function prevPhoto(){
 current=(current-1+photos.length)%photos.length;
 renderPhoto();
}

setInterval(()=>{
 const sec=document.getElementById("love");
 if(sec && sec.style.display==="block"){
   nextPhoto();
 }
},3000);

</script>

</body>
</html>
