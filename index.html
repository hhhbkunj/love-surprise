<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Gayathiri ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#1a001f,#330033);
color:white;
overflow-x:hidden;
text-align:center;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

h1{
font-size:55px;
color:#ff4da6;
text-shadow:0 0 20px pink;
}

h2{
margin-top:15px;
font-weight:normal;
font-size:25px;
}

button{
margin-top:40px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 30px #ff4da6;
}

.section{
padding:80px 20px;
display:none;
}

/* 100% working slider CSS */
.gallery-container {
max-width:420px;
margin:40px auto;
position: relative;
overflow: hidden;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,.2);
touch-action: pan-y;
}

.slider-wrapper {
display: flex;
transition: transform 0.5s ease-in-out;
width: 100%;
}

.slider-wrapper img {
width: 100%;
display: block;
flex-shrink: 0;
aspect-ratio:4/5;
object-fit:cover;
}

.footer{
padding:80px 20px;
font-size:35px;
color:pink;
}

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:fall linear infinite;
top:-50px;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* Running Away No Button Styling */
#noBtn {
    background: #555;
    transition: 0.15s ease;
}
#noBtn:hover {
    box-shadow: 0 0 20px #555;
}
</style>

</head>
<body>

<p>Enter Password</p>
<input id="pwd" type="password" placeholder="Password" style="padding:10px;width:90%;border-radius:10px;border:none;margin:10px 0;">
<br><button onclick="unlockSite()">Open</button>
<p id="msg" style="color:#ff8080;margin-top:10px;"></p>
</div></div>


<div class="hero" style="display:none;">
<h1>Gayathiri ❤️</h1>
<h2>I made something special only for you...</h2>
<button id="loveBtn" onclick="showLove()">Open My Heart ❤️</button>
</div>

<div class="section" id="love">
<h1 id="typingTitle">❤️</h1>
<p id="typingText" style="margin-top:25px;font-size:22px;line-height:40px;max-width:800px;margin:auto;white-space:pre-line;"></p>
